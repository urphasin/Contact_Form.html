<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact Form</title>
</head>

<body>
    <div class="root">
        <section>
            <form class="form" action="#" method="post">
                <h1>Contact Us</h1>
    
                <!-- NAME -->
                <div class="name">
                    <label for="name">Full Name *</label><br>
                    <input type="text" id="name" name="name" required minlength="2" maxlength="50" placeholder="John Doe">
                    <p>Enter your full name (2-50 characters)</p>
                </div>
    
    
    
                <!-- EMAIL -->
                <div class="email">
                    <label for="email">Email *</label><br>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                    <p>We'll never share your email.</p>
                </div>
    
    
    
                <!-- PHONE (pattern requirement) -->
                <div class="phone">
                    <label for="phone">Phone Number *</label><br>
                    <input type="tel" id="phone" name="phone" required pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        placeholder="123-456-7890">
                    <p>Format: 123-456-7890</p>
                </div>
    
    
    
                <!-- SELECT -->
                <div class="select">
                    <label for="subject">Subject *</label><br>
                    <select id="subject" name="subject" required>
                        <option value="">--Choose a subject--</option>
                        <option value="general">General Inquiry</option>
                        <option value="support">Support</option>
                        <option value="feedback">Feedback</option>
                    </select>
                </div>
    
    
    
                <!-- FIELDSET (RADIO BUTTONS) -->
                <div class="fieldset-radio">
                    <fieldset>
                        <legend>Urgency Level *</legend>
    
                        <input type="radio" id="low" name="urgency" value="low" required>
                        <label for="low">Low</label><br>
    
                        <input type="radio" id="medium" name="urgency" value="medium">
                        <label for="medium">Medium</label><br>
    
                        <input type="radio" id="high" name="urgency" value="high">
                        <label for="high">High</label>
                    </fieldset>
                </div>
    
                <br>
    
                <!-- FIELDSET (CHECKBOXES) -->
                <div class="fieldset-checkbox">
                    <fieldset>
                        <legend>Preferred Contact Method (optional)</legend>
    
                        <input type="checkbox" id="contact-email" name="contactMethod[]" value="email">
                        <label for="contact-email">Email</label><br>
    
                        <input type="checkbox" id="contact-phone" name="contactMethod[]" value="phone">
                        <label for="contact-phone">Phone</label><br>
    
                        <input type="checkbox" id="contact-text" name="contactMethod[]" value="text">
                        <label for="contact-text">Text</label>
                    </fieldset>
                </div>
    
    
    
    
                <!-- NUMBER -->
                <div class="number">
                    <label for="contact-count">How many times have you contacted us? *</label><br>
                    <input type="number" id="contact-count" name="contactCount" required min="1" max="10">
                </div>
    
    
    
    
                <!-- TEXTAREA -->
                <div class="textarea">
                    <label for="message">Message *</label><br>
                    <textarea id="message" name="message" rows="10" required minlength="10" maxlength="500"
                        placeholder="Write your message here..."></textarea>
                    <p>10-500 characters</p>
                </div>
    
    
    
                <!-- SUBMIT -->
                <div class="submit">
                    <button type="submit">Send Message</button>
                </div>
    
                <!-- SUCCESS MESSAGE -->
                <p class="success-message">
                    ✅ Thanks! We've received your message and will respond within 24 hours.
                </p>
    
            </form>
        </section>
    </div>
</body>

</html>
